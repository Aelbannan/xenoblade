name: Build

on:
  push:
  pull_request:

jobs:
  ppc-equivalence:
    name: PPC equivalence check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: tools/ppc_equivalence/requirements.txt

    - name: Install checker dependencies
      run: python -m pip install -r tools/ppc_equivalence/requirements.txt

    - name: Run checker quality gate
      run: |
        python tools/ppc_equivalence/gen_fixture_blob.py --check
        python tools/ppc_equivalence/run.py --self-test
        python tools/coop/run.py equivalence differential
        python tools/ppc_equivalence/run.py --help

  build:
    # This is a *private* build container.
    # See docs/github_actions.md for more information.
    container: ghcr.io/xbret/build:main

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add game versions here
        version: [jp, eu, us]

    steps:
    # Checkout the repository
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    # Set Git config
    - name: Git config
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    # Normalize file mod times
    - name: Restore timestamps
      run: |
        uv run https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2022.12/git-restore-mtime \
            --merge --commit-time
    
    # Copy the original files to the workspace
    - name: Prepare
      run: cp -R /orig .
    
    # Restore cached files
    - name: Cache build
      uses: actions/cache@v4
      with:
        path: |
          build
          .ninja_deps
          .ninja_log
        key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-${{ matrix.version }}-

    # Build the project
    - name: Build
      run: |
        python configure.py --map --version ${{ matrix.version }} \
            --binutils /binutils --compilers /compilers
        ninja all_source progress build/${{ matrix.version }}/report.json

    # Upload map files
    - name: Upload map
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_maps
        path: build/${{ matrix.version }}/**/*.MAP

    # Upload progress report
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_report
        path: build/${{ matrix.version }}/report.json
