# PPC equivalence CI pipeline
#
# Two levels:
#   1. Fast PR gate — runs on every push/PR touching ppc_equivalence paths
#   2. Full weekly run — same as PR gate PLUS Dolphin validation
#
# Dolphin binary is pinned externally (coop.json or DOLPHIN env / PATH).
# The --dolphin step is conditional on availability and never blocks PRs.
#
# Dependency locking (P1-10):
#   tools/ppc_equivalence/requirements.lock is a multi-platform hash lock
#   (uv pip compile --generate-hashes for manylinux x86_64 / Python 3.12).
#   CI installs with --require-hashes. The previous single-hash lock was
#   macOS arm64 / cp313-only and could not install on ubuntu-latest.

name: PPC Equivalence

on:
  push:
    paths:
      - "tools/ppc_equivalence/**"
      - "README.md"
      - ".github/workflows/ppc-equivalence.yml"
  pull_request:
    paths:
      - "tools/ppc_equivalence/**"
      - "README.md"
      - ".github/workflows/ppc-equivalence.yml"
  schedule:
    - cron: "0 6 * * 0"   # weekly Sunday 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/ppc_equivalence/requirements.lock

      - name: Verify lock freshness
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          req = Path("tools/ppc_equivalence/requirements.txt").read_text()
          lock = Path("tools/ppc_equivalence/requirements.lock").read_text().lower()
          pins = re.findall(r"^([A-Za-z0-9_.-]+)==([^\s#]+)", req, re.M)
          if not pins:
              print("no pins found in requirements.txt", file=sys.stderr)
              sys.exit(1)
          missing = []
          for name, ver in pins:
              needle = f"{name.lower()}=={ver.lower()}"
              if needle not in lock:
                  missing.append(needle)
          if missing:
              print("requirements.lock missing pins:", ", ".join(missing), file=sys.stderr)
              print(
                  "Regenerate with: uv pip compile tools/ppc_equivalence/requirements.txt "
                  "-o tools/ppc_equivalence/requirements.lock "
                  "--python-version 3.12 --generate-hashes "
                  "--python-platform x86_64-manylinux_2_28 --refresh",
                  file=sys.stderr,
              )
              sys.exit(1)
          print("lock freshness OK:", ", ".join(f"{n}=={v}" for n, v in pins))
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r tools/ppc_equivalence/requirements.lock

      - name: Docs sync check
        run: python -m tools.ppc_equivalence.docs_sync --check

      - name: Fixture freshness check
        run: python tools/ppc_equivalence/gen_fixture_blob.py --check

      - name: Run tests
        run: python -m unittest discover -s tools/ppc_equivalence/tests -p "test_*.py"

      - name: ConcreteOps differential
        run: python -m tools.ppc_equivalence differential

      # ── Full-run extras (schedule / workflow_dispatch only) ──────────────

      - name: Check Dolphin availability
        id: check-dolphin
        run: |
          if command -v dolphin-emu &>/dev/null || [ -n "$DOLPHIN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Dolphin differential
        if: |
          steps.check-dolphin.outputs.available == 'true'
          && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        continue-on-error: true
        run: python -m tools.ppc_equivalence differential --dolphin --json > dolphin_results.json

      - name: Upload validation summary
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ppc-equivalence-full
          path: dolphin_results.json
          if-no-files-found: ignore
