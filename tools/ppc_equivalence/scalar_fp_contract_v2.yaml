schema_version: 1
contract_id: scalar-fp-contract-v2
description: Phase 1 architectural contract for non-paired, non-PSQ Broadway scalar FP. See SCALAR_FP_V2.md
  and SOUNDNESS.md. Production Tier A remains on v1/v2 model identities until Phase 12; experimental v2/v3
  identities require SCALAR_FP_EXACT_V2=1.
capabilities:
  fp-fpscr-control:
    proposed: true
    experimental_model_version: broadway-fp-fpscr-control-v1
    production_attachment: fp-scalar-arithmetic
    migration_from: fp-scalar-arithmetic
    migration_note: Wave 3 production classify_fp_capabilities() still maps mffs/mtfsf/mtfsfi/mtfsb0/mtfsb1/mcrfs
      through FP_SCALAR_ARITH_OPS. Phase 1 contract assigns fp-fpscr-control as the v2 capability owner;
      production attachment and allowlists remain unchanged until Phase 12.
    opcodes:
    - mcrfs
    - mffs
    - mtfsb0
    - mtfsb1
    - mtfsf
    - mtfsfi
