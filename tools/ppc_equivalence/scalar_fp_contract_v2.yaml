    result_precision_fpr: writes binary64 full FPR to frD
    rn_sensitive: false
    ni_operand: none
    ni_result: none
    nan_selection_quieting: preserve loaded NaN payload and quiet bit
    signed_zero: preserve loaded signed zero
    invalid_subcause: none
    ox_ux_zx_xx: none
