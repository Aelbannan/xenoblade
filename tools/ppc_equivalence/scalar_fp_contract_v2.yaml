    rn_sensitive: true
    ni_operand: flush subnormal operands to signed zero before op when NI=1
    ni_result: flush subnormal result to signed zero when NI=1
    nan_selection_quieting: first NaN in operand order; quiet signaling NaNs on input
    signed_zero: preserve except NI flush maps subnormal to +0
    invalid_subcause: VXSNAN, VXISI, VXIMZ, VXZDZ, VXIDI per Dolphin NI_* precedence
    ox_ux_zx_xx: OX/UX/XX latch sticky per RN; ZX on nonzero/0 divide
    fi_fr_fprf: FI/FR from rounding when applicable; FPRF classifies result; Rc copies FPCC to CR1
