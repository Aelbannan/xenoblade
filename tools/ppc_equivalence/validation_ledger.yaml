# PPC equivalence validation ledger (P1-06).
# dolphin_interpreter=true only when the opcode is *executed* by a reachable
# (non decode-only) Dolphin / ConcreteOps fixture in broadway.jsonl.
#
# Permanently dolphin_interpreter=false (PRIVILEGED_DECODE_ONLY):
#   dcbz_l, mtmsr, mtsr, sc, rfi
# These appear in the corpus only behind an unconditional `b` that skips the
# word so the decoder stays covered; the generic DOL harness never returns
# through their side effects (locked-cache zero, MSR/SR writes, system call,
# or interrupt return). Promotion Gate 2/3 therefore treats them as missing
# dolphin evidence (`opcode-*-not-dolphin-validated`) — do not flip to true
# without a real harness-executable fixture.
#
# Capability-assurance coverage (Wave 2+). Independent of per-opcode dolphin
# rows below; fp-bitwise claims result-bit / no-host-float evidence for the
# sign-bit move subset only (see tools/ppc_equivalence/fp_bitwise.py).
# Wave 3 fp-scalar-arithmetic skeleton: dimensions declared incomplete until
# SoftFloat + symbolic RN/NI/FPSCR foundations promote.
# Wave 3 mmio-register-bank skeleton: incomplete until hardware-profile canary.
